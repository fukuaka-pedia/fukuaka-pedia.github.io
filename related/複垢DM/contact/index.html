    <section id="page-related-fukuakadm-contact" class="page-section hidden">
      <div class="content-area">
        <nav class="breadcrumb">
          <a href="https://fukuaka-pedia.github.io/">ホーム</a>
          <span class="breadcrumb__sep">›</span>
          <a href="https://fukuaka-pedia.github.io/related/">関連情報</a>
          <span class="breadcrumb__sep">›</span>
          <a href="https://fukuaka-pedia.github.io/related/複垢DM/">複垢DM</a>
          <span class="breadcrumb__sep">›</span>
          <span>情報提供</span>
        </nav>
        <div class="page-header">
          <h1 class="page-header__title">情報提供 — 複垢DM</h1>
          <p class="page-header__sub">このページに関する情報をご提供ください（すべて任意）</p>
        </div>

        <div class="form-card">
          <form id="contactFormFukuakaDM">
            <input type="hidden" name="page" value="related/複垢DM">

            <div class="form-group">
              <label class="form-label">正式名称<span class="form-optional">（任意）</span></label>
              <input type="text" name="formal_name" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">名称の読み方<span class="form-optional">（任意）</span></label>
              <input type="text" name="name_reading" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">外国語名称<span class="form-optional">（任意）</span></label>
              <input type="text" name="foreign_name" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">略称<span class="form-optional">（任意）</span></label>
              <input type="text" name="abbreviation" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">その他名称<span class="form-optional">（任意）</span></label>
              <input type="text" name="other_names" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">ユーザーネーム<span class="form-optional">（任意）</span></label>
              <input type="text" name="username" class="form-control" placeholder="@example">
            </div>
            <div class="form-group">
              <label class="form-label">活動開始日<span class="form-optional">（任意）</span></label>
              <input type="text" name="start_date" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">活動終了日<span class="form-optional">（任意）</span></label>
              <input type="text" name="end_date" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">現在の状態<span class="form-optional">（任意）</span></label>
              <select name="current_status" class="form-control form-control--select">
                <option value="">選択してください</option>
                <option>活動中</option>
                <option>休止中</option>
                <option>活動終了</option>
                <option>不明</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">表示名<span class="form-optional">（任意）</span></label>
              <input type="text" name="display_name" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">アイコンの説明<span class="form-optional">（任意）</span></label>
              <textarea name="icon_desc" class="form-control form-control--textarea" rows="3"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">代表者名<span class="form-optional">（任意）</span></label>
              <input type="text" name="rep_name" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">代表者のユーザーネーム<span class="form-optional">（任意）</span></label>
              <input type="text" name="rep_username" class="form-control" placeholder="@example">
            </div>
            <div class="form-group">
              <label class="form-label">政治的思想<span class="form-optional">（任意）</span></label>
              <input type="text" name="political_ideology" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">政治的立場<span class="form-optional">（任意）</span></label>
              <input type="text" name="political_position" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">その他<span class="form-optional">（任意）</span></label>
              <textarea name="other" class="form-control form-control--textarea" rows="4"></textarea>
            </div>

            <hr class="divider">
            <p class="text-sm text-sub" style="margin-bottom:0.75rem;">
              以下は<strong>Twitterのユーザーネームまたはメールアドレスのいずれか</strong>が必須です。
            </p>
            <div class="form-group">
              <label class="form-label">Twitterユーザーネーム<span class="form-optional">（いずれか必須）</span></label>
              <input type="text" name="contact_twitter" class="form-control" placeholder="@yourusername">
            </div>
            <div class="form-group">
              <label class="form-label">メールアドレス<span class="form-optional">（いずれか必須）</span></label>
              <input type="email" name="contact_email" class="form-control" placeholder="your@email.com">
            </div>
            <div class="form-submit">
              <button type="button" class="btn btn--primary" onclick="submitInfoContact('contactFormFukuakaDM')">送信する</button>
            </div>
            <div class="form-success" id="successFukuakaDMContact">
              ✅ 情報提供を受け付けました。ありがとうございます。
            </div>
          </form>
        </div>
      </div>
    </section>
