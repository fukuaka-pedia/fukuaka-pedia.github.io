<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta name="description" content="作ったものを置いておく場所">
  <meta property="og:title" content="複垢界隈図鑑">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="複垢界隈図鑑">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:image" content="https://fukuaka-pedia.github.io/assets/img/icon.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <title>お問い合わせ - 複垢界隈図鑑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fukuaka-pedia.github.io/assets/style.css">
  <link rel="icon" type="image/png" href="https://fukuaka-pedia.github.io/assets/img/icon.png">
  <script src="https://fukuaka-pedia.github.io/assets/common.js"></script>
</head>
<body>
  <header class="site-header">
    <a href="https://fukuaka-pedia.github.io/" class="site-header__brand">
      <img src="https://fukuaka-pedia.github.io/assets/img/icon.png" alt="複垢界隈図鑑" class="site-header__logo">
      <div>
        <span class="site-header__title-ja">複垢界隈図鑑</span>
        <span class="site-header__title-en">Fukuaka Pedia</span>
      </div>
    </a>
    <div class="site-header__search">
      <input type="text" id="globalSearch" placeholder="記事を検索…" autocomplete="off">
      <button onclick="doSearch()">検索</button>
    </div>
    <nav class="site-header__nav">
      <a href="https://fukuaka-pedia.github.io/accounts/">複垢一覧</a>
      <a href="https://fukuaka-pedia.github.io/ranking/">アクセスランキング</a>
    </nav>
  </header>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar__section">
        <div class="sidebar__heading">月間ランキング TOP5</div>
          <ul class="sidebar__list" id="sidebarRanking">
          <li style="padding:0.3rem 0.4rem;font-size:0.8rem;color:var(--color-text-muted);">読み込み中…</li>
        </ul>
      </div>
      <div class="sidebar__section">
        <div class="sidebar__heading">お気に入り</div>
        <ul class="sidebar__list" id="sidebarFavorites">
          <li id="favEmptyMsg" style="padding:0.3rem 0.4rem;font-size:0.8rem;color:var(--color-text-muted);">お気に入りはまだありません</li>
        </ul>
      </div>
    </aside>
    <main class="main-content">
      <section id="page-contact" class="page-section">
        <div class="content-area">
          <nav class="breadcrumb">
            <a href="https://fukuaka-pedia.github.io/">ホーム</a>
            <span class="breadcrumb__sep">›</span>
            <span>お問い合わせ</span>
          </nav>
          <div class="page-header">
            <h1 class="page-header__title">お問い合わせ</h1>
            <p class="page-header__sub">サイト全体に関するお問い合わせはこちら</p>
          </div>
          <div class="form-card">
            <form id="contactFormSite">
              <div class="form-group">
                <label class="form-label">問い合わせ種別<span class="form-required">*</span></label>
                <select name="inquiry_type" class="form-control form-control--select" required>
                  <option value="">選択してください</option>
                  <option value="error">情報の間違い</option>
                  <option value="question">サイトに関する質問</option>
                  <option value="request">掲載依頼</option>
                  <option value="other">その他</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">件名<span class="form-optional">（任意）</span></label>
                <input type="text" name="subject" class="form-control" placeholder="件名を入力してください">
              </div>
              <hr class="divider">
              <p class="text-sm text-sub" style="margin-bottom:0.75rem;">
                以下は<strong>Twitterのユーザーネームまたはメールアドレスのいずれか</strong>が必須です。
              </p>
              <div class="form-group">
                <label class="form-label">Twitterユーザーネーム<span class="form-optional">（いずれか必須）</span></label>
                <input type="text" name="contact_twitter" class="form-control" placeholder="@yourusername">
              </div>
              <div class="form-group">
                <label class="form-label">メールアドレス<span class="form-optional">（いずれか必須）</span></label>
                <input type="email" name="contact_email" class="form-control" placeholder="your@email.com">
              </div>
              <div class="form-group">
                <label class="form-label">内容<span class="form-optional">（任意）</span></label>
                <textarea name="content" class="form-control form-control--textarea" rows="6" placeholder="お問い合わせ内容を入力してください"></textarea>
              </div>
              <div class="form-group">
                <div class="file-upload-wrap">
                  <label class="file-upload-label" for="attachment">ファイルを選択</label>
                  <input type="file" id="attachment" name="attachment" class="file-upload-input"
                         onchange="updateFileName(this, 'fileUploadName')"
                         accept="image/*,.pdf,.txt">
                  <span class="file-upload-name" id="fileUploadName">未選択</span>
                </div>
                <div class="form-hint">画像・PDF・テキストのみ対応。5MB以内。</div>
              </div>
              <div class="form-submit">
                <button type="button" class="btn btn--primary" onclick="submitSiteContact('contactFormSite', 'successSiteContact')">送信する</button>
              </div>
              <div class="form-success" id="successSiteContact">
                問い合わせを受け付けました。ありがとうございます。
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
