<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta name="description" content="Twitterで活動する「複垢」に関する情報を収集・整理した図鑑サイト">
  <meta property="og:title" content="複垢界隈図鑑">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="複垢界隈図鑑">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:image" content="https://fukuaka-pedia.github.io/assets/img/icon.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <title>追加履歴 - 複垢界隈図鑑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fukuaka-pedia.github.io/assets/style.css">
  <link rel="icon" type="image/png" href="https://fukuaka-pedia.github.io/assets/img/icon.png">
  <script src="https://fukuaka-pedia.github.io/assets/common.js"></script>
</head>
<body>
  <header class="site-header">
    <a href="https://fukuaka-pedia.github.io/" class="site-header__brand">
      <img src="https://fukuaka-pedia.github.io/assets/img/icon.png" alt="複垢界隈図鑑" class="site-header__logo">
      <div>
        <span class="site-header__title-ja">複垢界隈図鑑</span>
        <span class="site-header__title-en">Fukuaka Pedia</span>
      </div>
    </a>
    <div class="site-header__search">
      <input type="text" id="globalSearch" placeholder="記事を検索…" autocomplete="off">
      <button onclick="doSearch()">検索</button>
    </div>
    <nav class="site-header__nav">
      <a href="https://fukuaka-pedia.github.io/accounts/">複垢一覧</a>
      <a href="https://fukuaka-pedia.github.io/ranking/">アクセスランキング</a>
    </nav>
  </header>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar__section">
        <div class="sidebar__heading">月間ランキング TOP5</div>
          <ul class="sidebar__list" id="sidebarRanking">
          <li style="padding:0.3rem 0.4rem;font-size:0.8rem;color:var(--color-text-muted);">読み込み中…</li>
        </ul>
      </div>
      <div class="sidebar__section">
        <div class="sidebar__heading">お気に入り</div>
        <ul class="sidebar__list" id="sidebarFavorites">
          <li id="favEmptyMsg" style="padding:0.3rem 0.4rem;font-size:0.8rem;color:var(--color-text-muted);">お気に入りはまだありません</li>
        </ul>
      </div>
    </aside>
    <main class="main-content">
      <section id="page-history" class="page-section">
        <div class="content-area">
          <nav class="breadcrumb">
            <a href="https://fukuaka-pedia.github.io/">ホーム</a>
            <span class="breadcrumb__sep">›</span>
            <span>追加履歴</span>
          </nav>
          <div class="page-header">
            <h1 class="page-header__title">追加履歴</h1>
            <p class="page-header__sub">ページが追加・更新された履歴の一覧</p>
          </div>
          <div class="history-filter">
            <select class="form-control" style="width:auto;" id="histFilterType">
              <option value="">すべての種別</option>
              <option value="account">複垢</option>
              <option value="related">関連情報</option>
            </select>
            <input type="text" class="form-control" style="width:auto;" id="histFilterKeyword" placeholder="キーワード検索…">
          </div>
          <div id="historyContainer">
            <div class="history-full-item">
              <div class="history-full-item__header">
                <span class="history-full-item__date">2025-01-15</span>
                <span class="history-full-item__page">
                  <a href="https://fukuaka-pedia.github.io/accounts/日本鳩吹党/">日本鳩吹党</a>
                </span>
                <span class="history-full-item__type">複垢</span>
              </div>
              <div class="history-full-item__body">ページを新規追加しました。</div>
            </div>
            <div class="history-full-item">
              <div class="history-full-item__header">
                <span class="history-full-item__date">2025-01-20</span>
                <span class="history-full-item__page">
                  <a href="https://fukuaka-pedia.github.io/related/複垢DM/">複垢DM</a>
                </span>
                <span class="history-full-item__type">関連情報</span>
              </div>
              <div class="history-full-item__body">ページを新規追加しました。</div>
            </div>
          </div>
          <div class="notice notice--info mt-2">
            追加履歴は手動で管理されています。
          </div>
        </div>
      </section>
    </main>
  </div>
  <script>
    initHistoryPage('historyContainer', 'histFilterType', 'histFilterKeyword');
  </script>
</body>
</html>
